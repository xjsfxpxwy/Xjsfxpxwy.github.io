<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的链接集纳</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 24px; }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; }
    a { color: #0969da; text-decoration: none; font-size: 18px; }
    a:hover { text-decoration: underline; }
    .desc { color: #656d76; font-size: 14px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>📎 我的链接集纳</h1>
  <ul>
    <li><a href="https://example.com" target="_blank">Example 网站</a><span class="desc">— 示例链接描述</span></li>
    <li><a href="https://github.com/xjsfxpxwy" target="_blank">我的 GitHub</a><span class="desc">— 个人代码仓库</span></li>
    <!-- 继续往下加 li 即可 -->
  </ul>
</body>
</html>
