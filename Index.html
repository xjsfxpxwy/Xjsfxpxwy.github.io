<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D渲染器 | 动态光影粒子系统 - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
        }

        /* 信息面板 - 现代半透明玻璃风格 */
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 24px;
            color: #ffffff;
            pointer-events: none;
            border-left: 4px solid #6c5ce7;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .info h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info p {
            margin: 5px 0 0;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .controls-tip {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: #ccc;
            font-family: monospace;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .info { padding: 8px 16px; }
            .info h1 { font-size: 0.9rem; }
            .controls-tip { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>✨ 动态光影渲染器 | 环面结 · 粒子星环 · 流光纹理</h1>
        <p>WebGL 实时渲染 | 旋转主几何体 | 动态环绕光源 | 漂浮粒子场</p>
    </div>
    <div class="controls-tip">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放
    </div>

    <!-- 引入 Three.js 核心库以及扩展组件 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 初始化场景、相机、渲染器 (核心渲染组件) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // 深邃星空蓝黑
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // 轻微雾效，增强景深

        // 透视相机: 视野, 宽高比, 近平面, 远平面
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;      // 启用阴影映射，提升真实感
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和阴影
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- 后期特效: 绽放光晕 (UnrealBloomPass) 增强视觉冲击 ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;  // 亮度阈值
        bloomPass.strength = 0.65;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- 轨道控制 (交互式渲染器必备) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // 惯性效果
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);

        // ========== 1. 核心几何体: 华丽环面结 (TorusKnot) 带动态纹理 ==========
        // 生成炫彩条纹纹理 (CanvasTexture)
        const createFlowTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // 绘制彩色渐变条纹
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 彩虹条纹风格
            const stripeCount = 24;
            const stripeWidth = canvas.width / stripeCount;
            const colors = [
                '#ff3366', '#ff6633', '#ff9933', '#ffcc33', '#ffff33',
                '#ccff33', '#99ff33', '#66ff33', '#33ff66', '#33ff99',
                '#33ffcc', '#33ffff', '#33ccff', '#3399ff', '#3366ff',
                '#3333ff', '#6633ff', '#9933ff', '#cc33ff', '#ff33cc',
                '#ff3399', '#ff3366', '#ff6633'
            ];
            
            for (let i = 0; i < stripeCount; i++) {
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(i * stripeWidth, 0, stripeWidth, canvas.height);
                // 添加细微的白色斜纹增加科技感
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(i * stripeWidth, 0);
                ctx.lineTo(i * stripeWidth, canvas.height);
                ctx.stroke();
            }
            
            // 添加中心光晕效果
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 1);      // 沿U方向重复，使纹理更紧密
            texture.needsUpdate = true;
            return texture;
        };
        
        const flowTexture = createFlowTexture();
        
        // 环面结几何体: 半径, 管半径, 径向分段, 管分段, p值, q值
        const knotGeometry = new THREE.TorusKnotGeometry(1.1, 0.32, 200, 32, 3, 4);
        const knotMaterial = new THREE.MeshStandardMaterial({
            map: flowTexture,
            roughness: 0.28,
            metalness: 0.85,
            emissive: new THREE.Color(0x221166),
            emissiveIntensity: 0.35,
            flatShading: false,
            side: THREE.DoubleSide
        });
        
        const torusKnot = new THREE.Mesh(knotGeometry, knotMaterial);
        torusKnot.castShadow = true;
        torusKnot.receiveShadow = true;
        torusKnot.position.y = 0.1;
        scene.add(torusKnot);
        
        // 增加一个半透明发光内环 (增强层次感)
        const innerGlowGeometry = new THREE.TorusKnotGeometry(1.05, 0.28, 180, 24, 3, 4);
        const glowMaterial = new THREE.MeshStandardMaterial({
            color: 0x88aaff,
            emissive: 0x3366cc,
            emissiveIntensity: 0.45,
            transparent: true,
            opacity: 0.25,
            side: THREE.BackSide
        });
        const innerGlowKnot = new THREE.Mesh(innerGlowGeometry, glowMaterial);
        innerGlowKnot.castShadow = false;
        innerGlowKnot.receiveShadow = false;
        scene.add(innerGlowKnot);
        
        // ========== 2. 粒子光环系统 (环绕主体旋转的粒子环) ==========
        const ringParticleCount = 800;
        const ringGeometry = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParticleCount * 3);
        const ringColors = new Float32Array(ringParticleCount * 3);
        
        const ringRadius = 1.85;
        for (let i = 0; i < ringParticleCount; i++) {
            const angle = (i / ringParticleCount) * Math.PI * 2;
            // 椭圆形状轻微偏移，增加动态感
            const x = Math.cos(angle) * ringRadius;
            const z = Math.sin(angle) * ringRadius;
            const y = Math.sin(angle * 2) * 0.2;  // 波浪形起伏
            
            ringPositions[i*3] = x;
            ringPositions[i*3+1] = y;
            ringPositions[i*3+2] = z;
            
            // 颜色: 根据角度渐变 (青 -> 紫 -> 品红)
            const color = new THREE.Color().setHSL(0.55 + Math.sin(angle) * 0.2, 1.0, 0.6);
            ringColors[i*3] = color.r;
            ringColors[i*3+1] = color.g;
            ringColors[i*3+2] = color.b;
        }
        ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
        
        const ringParticleMaterial = new THREE.PointsMaterial({
            size: 0.045,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.9
        });
        const ringParticles = new THREE.Points(ringGeometry, ringParticleMaterial);
        scene.add(ringParticles);
        
        // ========== 3. 星空粒子场 (深邃背景，随机分布 + 缓慢自转) ==========
        const starCount = 2500;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColorArray = new Float32Array(starCount * 3);
        
        for (let i = 0; i < starCount; i++) {
            // 分布在半径 12 到 28 的球壳区域
            const radius = 14 + Math.random() * 12;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            starPositions[i*3] = x;
            starPositions[i*3+1] = y * 0.6; // 略微压扁，形成银河感
            starPositions[i*3+2] = z;
            
            // 星星颜色: 冷白、淡蓝、淡金
            const tint = Math.random();
            let rColor;
            if (tint < 0.7) rColor = new THREE.Color(0xffffff);
            else if (tint < 0.85) rColor = new THREE.Color(0xaaccff);
            else rColor = new THREE.Color(0xffdd99);
            const intensity = 0.5 + Math.random() * 0.7;
            starColorArray[i*3] = rColor.r * intensity;
            starColorArray[i*3+1] = rColor.g * intensity;
            starColorArray[i*3+2] = rColor.b * intensity;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColorArray, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);
        
        // 额外小粒子云 (浮动微尘，增加科幻感)
        const dustCount = 1800;
        const dustGeometry = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 12;
            dustPositions[i*3+1] = (Math.random() - 0.5) * 8;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 12 - 4;
        }
        dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMaterial = new THREE.PointsMaterial({
            color: 0x77aaff,
            size: 0.02,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const dustCloud = new THREE.Points(dustGeometry, dustMaterial);
        scene.add(dustCloud);
        
        // ========== 4. 灯光系统 (动态光影 + 阴影) ==========
        // 环境光 - 基础照明
        const ambientLight = new THREE.AmbientLight(0x22223b, 0.55);
        scene.add(ambientLight);
        
        // 半球光 - 模拟天光
        const hemiLight = new THREE.HemisphereLight(0x6c5ce7, 0x44aa88, 0.45);
        scene.add(hemiLight);
        
        // 主光源: 方向光 (产生清晰阴影)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        dirLight.receiveShadow = false;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 12;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);
        
        // 辅助背光暖色
        const backLight = new THREE.PointLight(0xffaa66, 0.6);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        
        // 动态旋转光源 (冷色调，增加色彩变化)
        const movingLight = new THREE.PointLight(0x3a86ff, 0.9);
        movingLight.castShadow = true;
        movingLight.shadow.mapSize.width = 512;
        movingLight.shadow.mapSize.height = 512;
        movingLight.shadow.bias = -0.0001;
        scene.add(movingLight);
        
        // 第二个动态光源 (暖色，相反方向移动)
        const movingLightWarm = new THREE.PointLight(0xff6d3a, 0.7);
        movingLightWarm.castShadow = false;
        scene.add(movingLightWarm);
        
        // 在环面结下方添加一个辅助光，增加底部照明
        const fillLight = new THREE.PointLight(0x8855ff, 0.45);
        fillLight.position.set(0, -1.2, 0);
        scene.add(fillLight);
        
        // 可选: 简单的地面网格辅助线 (半透明，增强空间感，但不干扰主体)
        const gridHelper = new THREE.GridHelper(15, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        // 微弱轴线光晕 (装饰)
        const axesHelper = new THREE.AxesHelper(4);
        axesHelper.material.transparent = true;
        axesHelper.material.opacity = 0.08;
        scene.add(axesHelper);
        
        // ========== 5. 辅助动画变量 ==========
        let time = 0;
        
        // 动态更新纹理 (让纹理流动，产生流光效果)
        let textureOffset = 0;
        
        // 额外: 环绕粒子光圈的旋转速度以及缩放微调
        let ringRotationSpeed = 0.008;
        
        // 创建一个简单的粒子闪烁数组 (可选，提升星星生动性)
        // 由于星星数量多，不逐一控制，整体旋转即可
        
        // ========== 6. 动画循环 & 渲染逻辑 ==========
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016; // 近似每帧增量，实际与帧率无关，用于周期运动
            
            // --- 核心物体动画: 环面结自转 + 内部光晕结旋转 ---
            torusKnot.rotation.y += 0.008;
            torusKnot.rotation.x = Math.sin(time * 0.3) * 0.1;
            torusKnot.rotation.z = Math.cos(time * 0.2) * 0.05;
            
            innerGlowKnot.rotation.y = torusKnot.rotation.y - 0.02;
            innerGlowKnot.rotation.x = torusKnot.rotation.x;
            innerGlowKnot.rotation.z = torusKnot.rotation.z;
            
            // 纹理流动: 让纹理坐标偏移，产生流光溢彩效果
            textureOffset += 0.008;
            if (flowTexture) {
                flowTexture.offset.x = textureOffset * 0.5;
                flowTexture.offset.y = textureOffset * 0.2;
                flowTexture.needsUpdate = true;
            }
            
            // --- 粒子光环动态: 整体旋转 + 轻微缩放脉冲 ---
            ringParticles.rotation.y += ringRotationSpeed;
            ringParticles.rotation.x = Math.sin(time * 0.5) * 0.1;
            ringParticles.rotation.z = Math.cos(time * 0.7) * 0.05;
            
            // 星空粒子场缓慢自转，营造宇宙旋转感
            starField.rotation.y += 0.0008;
            starField.rotation.x += 0.0004;
            
            // 浮尘粒子云飘移
            dustCloud.rotation.y += 0.002;
            dustCloud.rotation.x += 0.001;
            
            // --- 动态光源运动: 两个点光源绕Y轴做圆周运动，相位相反 ---
            const lightRadius = 3.2;
            const lightY = 1.8 + Math.sin(time * 1.2) * 0.8;
            movingLight.position.x = Math.cos(time * 0.9) * lightRadius;
            movingLight.position.z = Math.sin(time * 0.9) * lightRadius;
            movingLight.position.y = lightY;
            // 动态改变光源强度/颜色，增加戏剧性
            movingLight.intensity = 0.85 + Math.sin(time * 1.8) * 0.3;
            movingLight.color.setHSL(0.55 + Math.sin(time * 0.7) * 0.1, 1.0, 0.6);
            
            // 暖色光源反向运动
            movingLightWarm.position.x = Math.cos(time * 0.7 + Math.PI) * 3.0;
            movingLightWarm.position.z = Math.sin(time * 0.7 + Math.PI) * 3.0;
            movingLightWarm.position.y = 1.2 + Math.cos(time * 1.1) * 0.6;
            movingLightWarm.intensity = 0.65 + Math.sin(time * 1.2) * 0.25;
            
            // 背光微动
            backLight.intensity = 0.55 + Math.sin(time * 0.9) * 0.15;
            
            // 底部补光灯强度呼吸效果
            fillLight.intensity = 0.45 + Math.sin(time * 1.4) * 0.2;
            
            // 让主方向光轻微移动，阴影更生动
            dirLight.position.x = 3 + Math.sin(time * 0.5) * 0.5;
            dirLight.position.z = 2 + Math.cos(time * 0.4) * 0.5;
            
            // 环面结材质的自发光强度微调
            knotMaterial.emissiveIntensity = 0.35 + Math.sin(time * 1.2) * 0.1;
            glowMaterial.emissiveIntensity = 0.45 + Math.sin(time * 1.6) * 0.15;
            
            // 粒子光环的尺寸大小根据音乐感微调 (动态视觉效果)
            const pulseScale = 0.9 + Math.sin(time * 3) * 0.05;
            ringParticleMaterial.size = 0.045 * pulseScale;
            
            // 星空粒子轻微闪烁通过整体透明度? 整体闪烁太刻意，不做整体，但通过颜色微调更自然（可选）
            // 为了使星星更具呼吸感，稍微改变透明度
            starMaterial.opacity = 0.7 + Math.sin(time * 0.5) * 0.08;
            
            // 更新轨道控制
            controls.update(); // 如果启用autoRotate则自动旋转，但我们使用手动控制，只需更新阻尼效果
            
            // 使用效果合成器渲染 (带辉光)
            effectComposer.render();
        }
        
        // 启动动画
        animate();
        
        // --- 窗口适配: 响应式布局 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 控制台输出就绪信息
        console.log('✨ 3D渲染器已启动 | 动态光影 | 粒子系统 | 流光纹理');
        
        // 可选: 简单的小彩蛋 - 控制台输出样式
        const styleConsole = "color: #6c5ce7; font-size: 14px; font-weight: bold;";
        console.log("%c🚀 高级渲染器运行中 | Three.js 动态场景 | 支持Bloom辉光", styleConsole);
        
        // 手动触发一次纹理初始偏移重置
        setTimeout(() => {
            flowTexture.needsUpdate = true;
        }, 100);
        
        // 增加一个隐藏的辅助性能指示器 (非必要，仅优化提示)
        // 所有组件已就绪
    </script>
</body>
</html>
